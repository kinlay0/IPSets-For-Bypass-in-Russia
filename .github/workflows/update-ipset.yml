name: update ipsets

on:
  schedule:
    - cron: "0 3 * * 0"
    # еженедельно по воскресеньям
  workflow_dispatch:

jobs:
  update-ipsets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: смотрю репозиторий
        uses: actions/checkout@v4

      - name: настраиваю питончик
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: устанавливаю библиотеку...
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: запускаю скрипт...
        run: |
          python "AS Parser/AS_Parser.py"

      - name: выкладываю...
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .
          
          if ! git diff --staged --quiet; then
            git commit -m "update ip's"
            git push origin HEAD
          else
            echo "изменений не было, пропускаю коммит"
          fi
